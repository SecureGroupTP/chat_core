name: Rust Docs Pages

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  RUST_VERSION: "1.93.1"
  JUST_VERSION: "1.40.0"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy

      - name: Install just (pinned)
        run: cargo install --locked just --version "${JUST_VERSION}"

      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: just doc

      - name: Add root index redirect
        run: |
          if [ ! -f target/doc/index.html ]; then
            cat > target/doc/index.html <<'HTML'
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./chat_core/index.html" />
              <title>chat_core docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="./chat_core/index.html">chat_core documentation</a>...</p>
            </body>
            </html>
            HTML
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
