name: SDK Codegen

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sdk-verify:
    runs-on: ubuntu-24.04
    env:
      RUST_VERSION: "1.93.1"
      GO_VERSION: "1.23.0"
      DART_VERSION: "3.11.4"
      JUST_VERSION: "1.40.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Install just (pinned)
        run: cargo install --locked just --version "${JUST_VERSION}"

      - name: Verify SDK generation
        run: just sdk-verify

      - name: Package generated SDK bundle
        run: |
          mkdir -p dist
          tar -czf "dist/chat_core-sdk-${{ github.ref_name }}.tar.gz" tmp/cpp tmp/go tmp/dart api/sdk_api.json include
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat_core-sdk-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
