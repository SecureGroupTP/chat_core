name: Cross Targets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  RUST_VERSION: "1.93.1"
  JUST_VERSION: "1.40.0"
  ZIG_VERSION: "0.14.0"
  CARGO_ZIGBUILD_VERSION: "0.22.1"
  CARGO_NDK_VERSION: "4.1.2"
  ANDROID_NDK_VERSION: "26.3.11579264"

jobs:
  linux-windows-cross:
    name: Linux/Windows (${{ matrix.asset_name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
          - target: armv7-unknown-linux-gnueabihf
            asset_name: linux-armv7
          - target: x86_64-pc-windows-gnu
            asset_name: windows-amd64
          - target: aarch64-pc-windows-gnullvm
            asset_name: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy
          target: ${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install just/cargo-zigbuild
        run: |
          cargo install --locked just --version "${JUST_VERSION}"
          cargo install --locked cargo-zigbuild --version "${CARGO_ZIGBUILD_VERSION}"

      - name: Build native library
        run: cargo zigbuild --release --target "${{ matrix.target }}" --lib

      - name: Package artifact
        run: |
          mkdir -p dist
          release_dir="target/${{ matrix.target }}/release"
          if [ -f "${release_dir}/libchat_core.so" ]; then
            cp "${release_dir}/libchat_core.so" "dist/chat_core-${{ matrix.asset_name }}.so"
          fi
          if [ -f "${release_dir}/chat_core.dll" ]; then
            cp "${release_dir}/chat_core.dll" "dist/chat_core-${{ matrix.asset_name }}.dll"
          fi
          if [ -f "${release_dir}/libchat_core.a" ]; then
            cp "${release_dir}/libchat_core.a" "dist/chat_core-${{ matrix.asset_name }}.a"
          fi
          if [ -f "${release_dir}/chat_core.lib" ]; then
            cp "${release_dir}/chat_core.lib" "dist/chat_core-${{ matrix.asset_name }}.lib"
          fi
          if [ -f "${release_dir}/libchat_core.dll.a" ]; then
            cp "${release_dir}/libchat_core.dll.a" "dist/chat_core-${{ matrix.asset_name }}.dll.a"
          fi
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat_core-${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  android-cross:
    name: Android (${{ matrix.asset_name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - android_abi: arm64-v8a
            rust_target: aarch64-linux-android
            asset_name: android-arm64
          - android_abi: armeabi-v7a
            rust_target: armv7-linux-androideabi
            asset_name: android-armv7
          - android_abi: x86_64
            rust_target: x86_64-linux-android
            asset_name: android-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy
          target: ${{ matrix.rust_target }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (pinned)
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android NDK env
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install just/cargo-ndk
        run: |
          cargo install --locked just --version "${JUST_VERSION}"
          cargo install --locked cargo-ndk --version "${CARGO_NDK_VERSION}"

      - name: Build native library
        run: cargo ndk -t "${{ matrix.android_abi }}" build --release --lib

      - name: Package artifact
        run: |
          mkdir -p dist
          release_dir="target/${{ matrix.rust_target }}/release"
          if [ -f "${release_dir}/libchat_core.so" ]; then
            cp "${release_dir}/libchat_core.so" "dist/chat_core-${{ matrix.asset_name }}.so"
          fi
          if [ -f "${release_dir}/libchat_core.a" ]; then
            cp "${release_dir}/libchat_core.a" "dist/chat_core-${{ matrix.asset_name }}.a"
          fi
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat_core-${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  windows-msvc:
    name: Windows MSVC (${{ matrix.asset_name }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-pc-windows-msvc
            asset_name: windows-msvc-amd64
          - rust_target: aarch64-pc-windows-msvc
            asset_name: windows-msvc-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy
          target: ${{ matrix.rust_target }}

      - name: Build Windows artifacts (MSVC)
        run: cargo build --release --target "${{ matrix.rust_target }}" --lib

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $releaseDir = "target/${{ matrix.rust_target }}/release"
          $copied = @()

          if (Test-Path "$releaseDir/chat_core.dll") {
            Copy-Item "$releaseDir/chat_core.dll" "dist/chat_core-${{ matrix.asset_name }}.dll"
            $copied += "dll"
          }
          if (Test-Path "$releaseDir/chat_core.lib") {
            Copy-Item "$releaseDir/chat_core.lib" "dist/chat_core-${{ matrix.asset_name }}.lib"
            $copied += "lib"
          }
          if (Test-Path "$releaseDir/chat_core.dll.lib") {
            Copy-Item "$releaseDir/chat_core.dll.lib" "dist/chat_core-${{ matrix.asset_name }}.dll.lib"
            $copied += "dll.lib"
          }

          if ($copied.Count -eq 0) {
            Write-Error "No MSVC artifacts found in $releaseDir"
          }

          Get-ChildItem dist | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat_core-${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
